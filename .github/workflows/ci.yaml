name : RoboGuard-AI - CI/CD PIPELINE

on:
  push:
    branches: [main, mlops]
  pull_request:
    branches: [main, mlops]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps : 
    # Grab the code from this repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with: 
        python-version: "3.12"
        cache: "pip"    #Enables pip caching → faster builds
    
    - name: Install Dependencies
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Download artifacts from DagsHub
    # We securely inject the GitHub Secrets into this specific step as Environment Variables
    - name: Download Cloud Artifacts (MLflow)
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      run: |
        python download_artifacts.py

    - name: Run Tests
      run: |
        python -m pytest -v tests/ 
      
    - name: Build Docker Image
      run: |
        docker build -t roboguard-api -f docker/Dockerfile.api .